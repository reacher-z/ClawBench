name: static-check

on:
  pull_request:
    branches: [ main ]
    paths:
      - "**.py"
      - ".github/workflows/static-check.yml"
      - ".env"
      - "models/models.example.yaml"
      - "models/model.schema.json"
      - "pyproject.toml"
      - "test-cases/**"
      - "uv.lock"
  push:
    branches: [ main ]
    paths:
      - "**.py"
      - ".github/workflows/static-check.yml"
      - ".env"
      - "models/models.example.yaml"
      - "models/model.schema.json"
      - "pyproject.toml"
      - "test-cases/**"
      - "uv.lock"
  workflow_dispatch:

jobs:
  static-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Ruff check
        run: uv run --frozen ruff check .

      - name: Ruff format check
        run: uv run --frozen ruff format --check .

      - name: Build package
        env:
          UV_FROZEN: "true"
        run: uv build
