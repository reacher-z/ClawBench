name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write    # PyPI trusted publishing (OIDC)
  packages: write    # ghcr.io image push

jobs:
  # ----------------------------------------------------------------------
  # PyPI wheel
  # ----------------------------------------------------------------------
  pypi:
    name: Publish wheel to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY_VER=$(uv run python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG" != "$PY_VER" ]; then
            echo "ERROR: git tag $TAG does not match pyproject version $PY_VER"
            exit 1
          fi

      - name: Run tests
        run: |
          uv sync --all-extras
          uv run pytest tests/ -v

      # The original ``claw-bench`` / ``clawbench`` names were taken on
      # PyPI before we could claim them, so we ship under a family of
      # alias distributions instead. The script below materializes one
      # distribution per alias name, builds a wheel, and uploads it.
      # All aliases share the version from the root ``pyproject.toml``.
      - name: Build and publish alias distributions
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv run python scripts/build-aliases.py --publish

  # ----------------------------------------------------------------------
  # GHCR container image (multi-arch)
  # ----------------------------------------------------------------------
  image:
    name: Publish container image to GHCR
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claw-bench:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/claw-bench:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.clawbench.version=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
