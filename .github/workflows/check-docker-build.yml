name: check-docker-build

on:
  pull_request:
    branches: [ main ]
    paths:
      - "src/clawbench/runtime/**"
      - ".github/workflows/check-docker-build.yml"
  push:
    branches: [ main ]
    paths:
      - "src/clawbench/runtime/**"
      - ".github/workflows/check-docker-build.yml"
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_PARALLELISM: "3"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker
        uses: docker/setup-docker-action@v5.1.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Restore Docker build cache
        id: docker-cache
        uses: actions/cache@v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-buildx-

      - name: Inspect restored Docker build cache
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d /tmp/.buildx-cache ]]; then
            echo "Restored cache scopes:"
            find /tmp/.buildx-cache -mindepth 1 -maxdepth 1 -type d -print | sort
            du -sh /tmp/.buildx-cache || true
          else
            echo "No Docker build cache restored."
          fi

      - name: Select harness Dockerfiles
        id: dockerfiles
        shell: bash
        run: |
          set -euo pipefail

          runtime_root="src/clawbench/runtime"
          harness_root="${runtime_root}/harnesses"
          base_dockerfile="${harness_root}/base/Dockerfile.base"

          mapfile -t all_harness_dockerfiles < <(
            find "${harness_root}" -mindepth 2 -maxdepth 2 -type f -name 'Dockerfile*' \
              ! -path "${base_dockerfile}" \
              | sort
          )

          build_all=false
          changed_runtime_files=()
          changed_dockerfiles=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            build_all=true
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base_sha="${{ github.event.pull_request.base.sha }}"
              head_sha="${{ github.event.pull_request.head.sha }}"
            else
              base_sha="${{ github.event.before }}"
              head_sha="${{ github.sha }}"
            fi

            if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
              echo "Unable to determine base SHA for Dockerfile diff." >&2
              exit 1
            elif ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              echo "Base SHA ${base_sha} is not available in the checkout." >&2
              exit 1
            elif ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
              echo "Head SHA ${head_sha} is not available in the checkout." >&2
              exit 1
            else
              mapfile -t changed_runtime_files < <(
                git diff --name-only --diff-filter=ACMRT "${base_sha}" "${head_sha}" -- "${runtime_root}" \
                  | sort
              )

              if (( ${#changed_runtime_files[@]} == 0 )); then
                build_all=true
              fi

              for path in "${changed_runtime_files[@]}"; do
                case "${path}" in
                  "${harness_root}/base/"*|"${runtime_root}/chrome-extension/"*|"${runtime_root}/extension-server/"*|"${runtime_root}/shared/"*)
                    build_all=true
                    break
                    ;;
                  "${harness_root}/"*)
                    harness="${path#"${harness_root}/"}"
                    harness="${harness%%/*}"
                    dockerfile="${harness_root}/${harness}/Dockerfile.${harness}"
                    if [[ -f "${dockerfile}" ]]; then
                      changed_dockerfiles+=("${dockerfile}")
                    fi
                    ;;
                esac
              done
            fi
          fi

          if [[ "${build_all}" == "true" ]]; then
            selected_dockerfiles=("${all_harness_dockerfiles[@]}")
          else
            selected_dockerfiles=()
            for dockerfile in "${changed_dockerfiles[@]}"; do
              if [[ "${dockerfile}" != "${base_dockerfile}" && -f "${dockerfile}" ]]; then
                selected_dockerfiles+=("${dockerfile}")
              fi
            done
            if (( ${#selected_dockerfiles[@]} > 0 )); then
              mapfile -t selected_dockerfiles < <(printf '%s\n' "${selected_dockerfiles[@]}" | sort -u)
            fi
          fi

          {
            echo "dockerfiles<<EOF"
            printf '%s\n' "${selected_dockerfiles[@]}"
            echo "EOF"
            echo "count=${#selected_dockerfiles[@]}"
          } >> "${GITHUB_OUTPUT}"

          echo "Selected ${#selected_dockerfiles[@]} harness Dockerfile(s):"
          printf '  %s\n' "${selected_dockerfiles[@]}"
          echo "::notice title=Docker build plan::Selected ${#selected_dockerfiles[@]} harness Dockerfile(s)"

          {
            echo "## Docker build plan"
            echo
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Selection mode: \`$([[ "${build_all}" == "true" ]] && echo all || echo changed)\`"
            echo "- Base image: \`clawbench-base\`, \`clawbench-base:amd64\`"
            echo "- Harness images: \`${#selected_dockerfiles[@]}\`"
            echo
            echo "| Image | Dockerfile |"
            echo "| --- | --- |"
            echo "| \`clawbench-base\`, \`clawbench-base:amd64\` | \`${base_dockerfile}\` |"
            for dockerfile in "${selected_dockerfiles[@]}"; do
              harness="$(basename "$(dirname "${dockerfile}")")"
              echo "| \`clawbench-${harness}\` | \`${dockerfile}\` |"
            done
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Build Docker images
        shell: bash
        run: |
          set -euo pipefail
          runtime_root="src/clawbench/runtime"
          harness_root="${runtime_root}/harnesses"
          base_dockerfile="${harness_root}/base/Dockerfile.base"
          cache_root="/tmp/.buildx-cache"
          cache_update="/tmp/.buildx-cache-update"
          status_root="/tmp/clawbench-docker-build-status"
          parallelism="${DOCKER_BUILD_PARALLELISM:-3}"

          rm -rf "${cache_update}" "${status_root}"
          mkdir -p "${cache_root}" "${cache_update}" "${status_root}"

          {
            echo
            echo "## Docker build results"
            echo
            echo "- Restored cache key: \`${{ steps.docker-cache.outputs.cache-matched-key || 'none' }}\`"
            echo "- Exact cache hit: \`${{ steps.docker-cache.outputs.cache-hit || 'false' }}\`"
            echo
            echo "| Image | Status |"
            echo "| --- | --- |"
          } >> "${GITHUB_STEP_SUMMARY}"

          build_with_cache() {
            local dockerfile="$1"
            local image="$2"
            local scope="$3"
            local cache_args=()

            if [[ -f "${cache_root}/${scope}/index.json" ]]; then
              echo "[cache] ${scope}: hit at ${cache_root}/${scope}"
              cache_args+=(--cache-from "type=local,src=${cache_root}/${scope}")
            else
              echo "[cache] ${scope}: miss"
            fi

            docker buildx build \
              --load \
              --progress=plain \
              --provenance=false \
              -f "${dockerfile}" \
              -t "${image}" \
              "${cache_args[@]}" \
              --cache-to "type=local,dest=${cache_update}/${scope},mode=max" \
              "${runtime_root}"
          }

          if build_with_cache "${base_dockerfile}" "clawbench-base" "base"; then
            docker tag clawbench-base clawbench-base:amd64
            echo "| \`clawbench-base\`, \`clawbench-base:amd64\` | Passed |" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "| \`clawbench-base\`, \`clawbench-base:amd64\` | Failed |" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          build_harness() {
            local dockerfile="$1"
            local harness
            local image
            local status

            harness="$(basename "$(dirname "${dockerfile}")")"
            image="clawbench-${harness}"
            status="${status_root}/${harness}.status"

            echo "[${harness}] Starting ${image}"
            set -o pipefail
            if build_with_cache "${dockerfile}" "${image}" "${harness}" 2>&1 | sed -u "s/^/[${harness}] /"; then
              echo "passed" > "${status}"
              echo "[${harness}] Finished ${image}"
            else
              echo "failed" > "${status}"
              echo "[${harness}] Failed ${image}"
              return 1
            fi
          }

          export -f build_with_cache build_harness
          export runtime_root cache_root cache_update status_root

          mapfile -t selected_dockerfiles <<'EOF'
          ${{ steps.dockerfiles.outputs.dockerfiles }}
          EOF
          filtered_dockerfiles=()
          for dockerfile in "${selected_dockerfiles[@]}"; do
            [[ -n "${dockerfile}" ]] && filtered_dockerfiles+=("${dockerfile}")
          done
          selected_dockerfiles=("${filtered_dockerfiles[@]}")

          if (( ${#selected_dockerfiles[@]} > 0 )); then
            echo "Building ${#selected_dockerfiles[@]} harness image(s) with parallelism=${parallelism}"
            set +e
            printf '%s\0' "${selected_dockerfiles[@]}" \
              | xargs -0 -n 1 -P "${parallelism}" bash -c "build_harness \"\$1\"" _
            harness_status=$?
            set -e

            for dockerfile in "${selected_dockerfiles[@]}"; do
              [[ -n "${dockerfile}" ]] || continue
              harness="$(basename "$(dirname "${dockerfile}")")"
              image="clawbench-${harness}"
              if [[ "$(cat "${status_root}/${harness}.status" 2>/dev/null || true)" == "passed" ]]; then
                echo "| \`${image}\` | Passed |" >> "${GITHUB_STEP_SUMMARY}"
              else
                echo "| \`${image}\` | Failed |" >> "${GITHUB_STEP_SUMMARY}"
              fi
            done

            if (( harness_status != 0 )); then
              exit "${harness_status}"
            fi
          fi

          for scope_dir in "${cache_update}"/*; do
            [[ -d "${scope_dir}" ]] || continue
            scope="$(basename "${scope_dir}")"
            rm -rf "${cache_root:?}/${scope}"
            mv "${scope_dir}" "${cache_root}/${scope}"
          done
          rm -rf "${cache_update}"
