<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 440" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ClawBench — Real-World Browser Agent Benchmark on Everyday Online Tasks">
  <defs>
